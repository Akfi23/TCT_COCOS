<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>Cocos Creator | TCT</title>


<meta name="viewport"
      content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1"/>


<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">


<meta name="renderer" content="webkit"/>
<meta name="force-rendering" content="webkit"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>


<meta name="full-screen" content="yes"/>
<meta name="x5-fullscreen" content="true"/>
<meta name="360-fullscreen" content="true">


<meta name="screen-orientation" content="portrait"/>
<meta name="x5-orientation" content="portrait">


<link rel="stylesheet" type="text/css" href="style-mobile.25fc5.css"/>
<link rel="icon" href="favicon.8de18.ico"/>


<style>


html,
body {

    width:100%;
    height:100%;

    margin:0;
    padding:0;

    overflow:hidden;

    background:#000;

}



#GameContainer {


    position:fixed;


    left:0;
    top:0;


    width:100vw;
    height:100vh;


    overflow:hidden;

}



#GameCanvas {


    position:absolute;


    left:0;
    top:0;


    width:100%;
    height:100%;


    display:block;

}




#splash {


    position:fixed;


    left:50%;
    top:50%;


    transform:translate(-50%, -50%);

}


</style>


</head>



<body>



<div id="GameContainer">


    <canvas 
        id="GameCanvas"
        oncontextmenu="event.preventDefault()"
        tabindex="0">
    </canvas>


</div>



<div id="splash">


    <div class="progress-bar stripes">

        <span style="width:0%"></span>

    </div>


</div>




<script src="src/settings.2c0e4.js" charset="utf-8"></script>

<script src="main.d33c7.js" charset="utf-8"></script>




<script type="text/javascript">


(function () {


    if (typeof VConsole !== 'undefined') {

        window.vConsole = new VConsole();

    }



    var debug = window._CCSettings.debug;


    var splash = document.getElementById('splash');

    splash.style.display = 'block';





    function loadScript(moduleName, cb) {



        function scriptLoaded() {


            document.body.removeChild(domScript);


            domScript.removeEventListener(
                'load',
                scriptLoaded,
                false
            );


            cb && cb();

        }





        var domScript = document.createElement('script');


        domScript.async = true;


        domScript.src = moduleName;


        domScript.addEventListener(
            'load',
            scriptLoaded,
            false
        );



        document.body.appendChild(domScript);


    }





    loadScript(

        debug 
        ? 'cocos2d-js.js'
        : 'cocos2d-js-min.13c82.js',



        function () {



            if (CC_PHYSICS_BUILTIN || CC_PHYSICS_CANNON) {



                loadScript(

                    debug
                    ? 'physics.js'
                    : 'physics-min.ad9a7.js',


                    window.boot

                );



            }
            else {


                window.boot();


            }



        }


    );



})();



</script>




</body>

</html>
